<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="400" viewBox="0 0 1280 400" fill="none" role="img" aria-label="3D Web Pack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08080c"/>
      <stop offset="1" stop-color="#0d0b16"/>
    </linearGradient>
    <linearGradient id="grad" x1="300" y1="120" x2="1000" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b8cff"/>
      <stop offset="0.55" stop-color="#c44bff"/>
      <stop offset="1" stop-color="#ff5ca8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#7c5cff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>

  <rect width="1280" height="400" fill="url(#bg)"/>
  <circle cx="1010" cy="200" r="220" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="240" cy="320" r="160" fill="url(#glow)" opacity="0.5" filter="url(#blur)"/>

  <!-- wireframe icosa-ish mark -->
  <g transform="translate(1000 200)" stroke="url(#grad)" stroke-width="2" fill="none" opacity="0.9">
    <polygon points="0,-120 104,-60 104,60 0,120 -104,60 -104,-60"/>
    <polygon points="0,-70 60,-35 60,35 0,70 -60,35 -60,-35"/>
    <line x1="0" y1="-120" x2="0" y2="120"/>
    <line x1="-104" y1="-60" x2="104" y2="60"/>
    <line x1="104" y1="-60" x2="-104" y2="60"/>
    <line x1="0" y1="-120" x2="104" y2="60"/>
    <line x1="0" y1="-120" x2="-104" y2="60"/>
    <line x1="0" y1="120" x2="104" y2="-60"/>
    <line x1="0" y1="120" x2="-104" y2="-60"/>
  </g>

  <!-- dotted grid accent -->
  <g fill="#5b8cff" opacity="0.25">
    <circle cx="120" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="200" cy="80" r="2"/>
    <circle cx="120" cy="120" r="2"/><circle cx="160" cy="120" r="2"/><circle cx="200" cy="120" r="2"/>
  </g>

  <text x="110" y="180" font-family="'Space Grotesk', Arial, sans-serif" font-size="76" font-weight="700" fill="#ffffff">3D Web Pack</text>
  <text x="112" y="232" font-family="'Space Grotesk', Arial, sans-serif" font-size="26" font-weight="500" fill="url(#grad)">Claude Code agents &amp; skills for award-style 3D websites</text>
  <text x="112" y="300" font-family="Arial, sans-serif" font-size="19" fill="#9aa0b4">6 specialized agents · 4 workflow skills · Three.js · R3F · WebGPU · GSAP</text>
</svg>
